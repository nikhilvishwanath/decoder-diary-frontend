services:
  frontend:
    build:
      context: .
      args:
        - VITE_API_URL=http://backend:8000
        - NODE_ENV=development
    restart: always
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    # Backend service from decoder-diary-backend repo
    # To use this, ensure decoder-diary-backend is running on port 8000
    # Either run it separately or modify this to build from the backend repo
    image: decoder-diary-backend:latest
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=decoder_diary
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=decoder-diary@2025
    depends_on:
      - db

  db:
    image: postgres:17
    restart: always
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
      start_period: 30s
    volumes:
      - app-db-data:/var/lib/postgresql/data/pgdata
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=decoder-diary@2025
      - POSTGRES_USER=postgres
      - POSTGRES_DB=decoder_diary

volumes:
  app-db-data:
